name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Unit + integration tests (goldens excluded)
        run: flutter test test/features/ test/integration/

      - name: Golden tests (informational)
        run: flutter test test/golden/
        continue-on-error: true

name: ten_k_hours
description: "Count down 10,000 hours toward mastery of any pursuit."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.3

  # Persistence
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.5

  # Notifications + time
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  permission_handler: ^12.0.1
  intl: any

  # UI
  dynamic_color: ^1.8.1

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  very_good_analysis: ^10.0.0
  sqlite3: ^3.3.1

  build_runner: ^2.4.13
  riverpod_generator: ^4.0.4-dev.1
  drift_dev: ^2.31.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  go_router_builder: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
